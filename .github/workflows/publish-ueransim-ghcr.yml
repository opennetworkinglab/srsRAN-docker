# SPDX-License-Identifier: Apache-2.0

name: Publish UERANSIM to GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: true
        default: rel-0.7.1-amd64
        type: string
      ueransim_ref:
        description: "UERANSIM git ref to build"
        required: true
        default: v3.2.7
        type: string
      os_version:
        description: "Ubuntu base image version"
        required: true
        default: "22.04"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-ueransim:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push UERANSIM image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          OS_VERSION: ${{ inputs.os_version }}
          UERANSIM_REF: ${{ inputs.ueransim_ref }}
        run: |
          image_owner="${GITHUB_REPOSITORY_OWNER,,}"
          make docker-build \
            DOCKER_TARGETS=ueransim \
            DOCKER_REGISTRY=ghcr.io/ \
            DOCKER_REPOSITORY="${image_owner}/" \
            DOCKER_TAG="$IMAGE_TAG" \
            DOCKER_BUILD_ARGS="--platform linux/amd64 --build-arg OS_VERSION=${OS_VERSION}"
          make docker-push \
            DOCKER_TARGETS=ueransim \
            DOCKER_REGISTRY=ghcr.io/ \
            DOCKER_REPOSITORY="${image_owner}/" \
            DOCKER_TAG="$IMAGE_TAG"

      - name: Print image reference
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          image_owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "Published ghcr.io/${image_owner}/ueransim:${IMAGE_TAG}"
